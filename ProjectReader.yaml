# Project Reader Configuration

max_chars_python: 8000
max_chars_code: 3000
max_chars_text: 1500

ignore_patterns:
  - .git
  - node_modules
  - __pycache__
  - venv
  - .idea
  - .vscode
  - build
  - dist
  - *.pyc
  - *.exe
  - *.dll
  - *.so
  - *.dylib
  - *.class
  - *.jar
  - *.jpg
  - *.png
  - *.gif
  - *.mp4
  - *.zip
  - *.tar
  - *.gz
  - *.pdf
  - *.db
  - *.sqlite

summary_patterns:
  - *.log
  - *.tmp
  - migrations/*.py
  - *.svg
  - *.lock
  - *.json
  - *.xml

